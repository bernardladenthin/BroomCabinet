<html>
<head>
    <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>
    <script type="text/javascript" src="https://code.jquery.com/jquery-2.2.3.min.js"></script>
    <script type="text/javascript" src="https://cdnjs.cloudflare.com/ajax/libs/dygraph/1.1.1/dygraph-combined.js"></script>
    <script type="text/javascript">
    // EXAMPLE ONLY — fetches the JSON history from counter-endpoint.php and
    // draws it with Google Charts (cumulative) and Dygraph (per-minute).
    // Point the URL below at your own endpoint and sensor name.
    global = {};
    google.charts.load('current', {
        'packages': ['line', 'corechart', 'annotationchart']
    });
    google.charts.setOnLoadCallback(requestData);

    function successCallback(result) {
        global.data = result;
        drawChart();
    }

    function requestData() {
        $.ajax({
            dataType: "json",
            url: "http://example.com/counter-endpoint.php?name=mysensor",
            success: successCallback
        });
    }

    function drawChart() {
        var rows = [];
        var rowsIntegral = [];
        var sum = 0;

        global.data.values.sort(function(a, b) {
            return a['time'] > b['time'] ? 1 : -1;
        });

        $.each(global.data.values, function(index, value) {
            var dateValue = new Date(value.time * 1000);
            var intValue = parseInt(value.value);
            sum += intValue;
            rows.push([dateValue, intValue]);
            rowsIntegral.push([dateValue, sum]);
        });

        // for random data
        if (false) {
            rows = [];
            for (var i = 1462700000; i <= 1463700000; i += 60) {
                var randVal = Math.floor((Math.random() * 100) + 1);
                rows.push([new Date(i * 1000), randVal]);
            }
        }
        //console.log(rows);

        var data = new google.visualization.DataTable();
        data.addColumn('date', 'Time');
        data.addColumn('number', 'Verbrauch');
        data.addRows(rowsIntegral);

        var options = {
            chart: {
                title: 'Zaehlerstand der letzten 10 Tage',
                subtitle: '-'
            },
            width: 900,
            height: 500,
            axes: {
                x: {
                    0: {
                        side: 'bottom'
                    }
                }
            },
            trendlines: {
                0: {}
            } // Draw a trendline for data series 0.
        };

        var chart = new google.visualization.AnnotationChart(document.getElementById('line_top_x'));
        chart.draw(data, options);

        g = new Dygraph(
            document.getElementById("demodiv"),
            rows, {
                labels: ['Date', 'Value'],
                legend: 'always',
                showRoller: true,
                //rollPeriod: 120,
                rollPeriod: 1, // 20
                height: 600,
                width: 1024
            }
        );
}
  </script>
</head>
<body>
  <div id="demodiv"></div>
  <div id="line_top_x"></div>
</body>
</html>
