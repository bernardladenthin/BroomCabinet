# Filtered at build time by maven-resources-plugin (filtering=true).
# Records the exact Oracle JDBC driver version this artifact was built against,
# so the reproducer is self-describing in every run mode (including the fat jar,
# whose merged manifest loses the ojdbc Implementation-Version).
ojdbc.version=${ojdbc.version}
